
services:
  api:
    build: .
    container_name: currency_api
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__CurrencyConnectionString: "server=mysql;port=3306;database=currencydb;user=root;password=Lolal@33"

  mysql:
    image: mysql:8.0
    container_name: currency_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Lolal@33
      MYSQL_DATABASE: currencydb
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: